<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Luffy's Quest">
<meta name="mobile-web-app-capable" content="yes">
<title>Luffy's Survival Quest</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
    /* Fill the whole screen including notch areas */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  body{
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    font-family:'Courier New',monospace;
  }
  canvas{display:block;cursor:crosshair;touch-action:none;}
  #ui{position:fixed;bottom:0;left:0;width:100%;height:180px;pointer-events:none;display:flex;align-items:flex-end;}
  /* Joystick zone */
  #joystickZone{position:fixed;bottom:10px;left:10px;width:160px;height:160px;pointer-events:all;touch-action:none;}
  #joystickBase{position:absolute;width:130px;height:130px;border-radius:50%;border:3px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);top:15px;left:15px;}
  #joystickThumb{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.55);border:2px solid rgba(255,255,255,0.8);top:54px;left:54px;transition:none;}
  /* Power buttons */
  #powers{position:fixed;bottom:10px;right:10px;display:grid;grid-template-columns:repeat(3,64px);grid-template-rows:repeat(2,64px);gap:8px;pointer-events:all;}
  .pbtn{width:64px;height:64px;border-radius:14px;border:2px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.6);color:#fff;font-family:'Courier New',monospace;font-size:9px;font-weight:bold;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;touch-action:none;-webkit-tap-highlight-color:transparent;transition:transform 0.08s,opacity 0.08s;}
  .pbtn:active{transform:scale(0.88);opacity:0.7;}
  .pbtn .icon{font-size:22px;line-height:1;}
  .pbtn.ready{box-shadow:0 0 10px currentColor;}
  .pbtn.active-glow{animation:glow 0.4s ease-in-out infinite alternate;}
  @keyframes glow{from{box-shadow:0 0 6px currentColor;}to{box-shadow:0 0 22px currentColor;}}
  /* Aim dot */
  #aimDot{position:fixed;width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,200,0,0.8);background:rgba(255,200,0,0.25);pointer-events:none;transform:translate(-50%,-50%);display:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Virtual joystick -->
<div id="joystickZone">
  <div id="joystickBase"></div>
  <div id="joystickThumb"></div>
</div>

<!-- Power buttons -->
<div id="powers">
  <button class="pbtn" id="btn-lightning" style="color:#ffff00;" ontouchstart="touchPower('lightning')" onclick="touchPower('lightning')">
    <span class="icon">⚡</span>LIGHTNING
  </button>
  <button class="pbtn" id="btn-heal" style="color:#44ff88;" ontouchstart="touchPower('heal')" onclick="touchPower('heal')">
    <span class="icon">💚</span>HEAL
  </button>
  <button class="pbtn" id="btn-teleport" style="color:#cc88ff;" ontouchstart="touchPower('teleport')" onclick="touchPower('teleport')">
    <span class="icon">🌀</span>WARP
  </button>
  <button class="pbtn" id="btn-block" style="color:#4488ff;" ontouchstart="touchPower('block')" onclick="touchPower('block')">
    <span class="icon">🛡️</span>BLOCK
  </button>
  <button class="pbtn" id="btn-gear5" style="color:#ffffff;" ontouchstart="touchPower('gear5')" onclick="touchPower('gear5')">
    <span class="icon">☁️</span>GEAR 5
  </button>
  <button class="pbtn" id="btn-haki" style="color:#aa00ff;" ontouchstart="touchPower('haki')" onclick="touchPower('haki')">
    <span class="icon">👊</span>HAKI
  </button>
</div>

<!-- Aim indicator -->
<div id="aimDot"></div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 960, H = 620;
canvas.width = W; canvas.height = H;

// ── PSEUDO-3D CONFIG ─────────────────────────────────────────────────────────
const PERSP = 0.55;   // how many px per unit of z height
// screenY = worldY - z * PERSP

function sY(worldY, z){ return worldY - z * PERSP; }

function drawShadow(x, y, rx, ry=null, alpha=0.32){
  ry = ry ?? rx * 0.38;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle   = '#000';
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ── GAME STATE ───────────────────────────────────────────────────────────────
const game = {
  state: 'menu',  // menu|cutscene|playing|boss|gameover|levelcomplete|win
  level: 0, lives: 3, score: 0,
  wave: 0,
  get maxWaves(){ return LEVELS[game.level]?.enemyCount?.length || 3; },
  enemies: [], projectiles: [], particles: [],
  boss: null, bossDefeated: false,
  cutTimer: 0, cutDuration: 300,
  waveTimer: 0, invTimer: 0,
  flashTimer: 0, flashCol: '#f00',
  envObjs: [],   // static 3D scene objects per level
  halos: [],     // expanding shockwave rings (Haki)
};

// ── LEVELS ───────────────────────────────────────────────────────────────────
const LEVELS = [
  { name:'The Town',      sub:'Survive the Angry Mob',
    story:["The people of Westbrook never trusted Devil Fruit users...","Tonight the whole town has come for YOU.","Armed with torches and pitchforks,","the mob floods the town square.","Survive 3 waves and escape to sea!"],
    bg:'#1a0e05', col:'#e8a030', enemyType:'townsperson', enemyCount:[4,7,10], hasBoss:false },
  { name:'Monkey Island', sub:'Jungle of the Gorilla King',
    story:["The Marines dropped you on Monkey Island...","A place no Marine returns from.","Monkeys and gorillas guard every path.","Their KING wears a crown of bones.","Defeat the Gorilla King to reach the next island!"],
    bg:'#051405', col:'#30c830', enemyType:'monkey', enemyCount:[4,7,10,13], hasBoss:true, bossKey:'gorilla_king' },
  { name:'Sky Island',    sub:'Above the Clouds',
    story:["A sky ship carried you to the clouds...","The birds and flying pigs that live here","defend their floating kingdom furiously.","The Pig Commander has a BAZOOKA.","Don't let him clip your wings!"],
    bg:'#05102a', col:'#30a0e8', enemyType:'bird', enemyCount:[3,5,7], hasBoss:true, bossKey:'pig_commander' },
  { name:'Volcano Island',  sub:'The Lava Pits of Doom',
    story:["Deep in the Grand Line lies Volcano Island...","A place of fire, lava, and ancient fury.","Lava lizards and fire hawks guard the peak.","At the summit sleeps the MAGMA DRAGON,","a creature that has not lost in 1000 years.","WAKE IT UP."],
    bg:'#1a0505', col:'#ff5500', enemyType:'lavaliz', enemyCount:[5,8,11,14,17,20], hasBoss:true, bossKey:'magma_dragon' },
];

// ── PLAYER ───────────────────────────────────────────────────────────────────
const P = {
  x:W/2, y:H/2, z:0, speed:3.2, baseSpeed:3.2, size:18,
  facing:0,
  lightCd:0,  lightMax:9,
  healCd:0,   healMax:360,
  teleCd:0,   teleMax:42,
  blockActive:false, blockDuration:0, blockDurationMax:90,
  blockCd:0,  blockCdMax:300,
  gear5Active:false, gear5Duration:0, gear5DurationMax:300,
  gear5Cd:0, gear5CdMax:900, gear5PunchTimer:0,
  hakiCd:0, hakiCdMax:700,
  bobT:0, moving:false,
};

// ── INPUT ────────────────────────────────────────────────────────────────────
const keys = {};
let mX=W/2, mY=H/2;

canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  mX=(e.clientX-r.left)*(W/r.width);
  mY=(e.clientY-r.top)*(H/r.height);
  P.facing=Math.atan2(mY-P.y, mX-P.x);
});
canvas.addEventListener('click', () => {
  if (game.state==='menu')           { startGame(); return; }
  if (game.state==='cutscene')       { game.cutTimer=game.cutDuration; return; }
  if (game.state==='levelcomplete')  { nextLevel(); return; }
  if (game.state==='gameover'||game.state==='win') { startGame(); return; }
  if (game.state==='playing'||game.state==='boss') fireLightning();
});
canvas.addEventListener('contextmenu', e => { e.preventDefault(); if(game.state==='playing'||game.state==='boss') fireHeal(); });
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '){ e.preventDefault(); if(game.state==='playing'||game.state==='boss') doTeleport(); }
  if(e.key.toLowerCase()==='q') { if(game.state==='playing'||game.state==='boss') doBlock(); }
  if(e.key.toLowerCase()==='e') { if(game.state==='playing'||game.state==='boss') fireHaki(); }
  if(e.key.toLowerCase()==='r') { if(game.state==='playing'||game.state==='boss') fireGear5(); }
  if(e.key==='Enter'){
    if(game.state==='menu')          startGame();
    else if(game.state==='cutscene') game.cutTimer=game.cutDuration;
    else if(game.state==='levelcomplete') nextLevel();
    else if(game.state==='gameover'||game.state==='win') startGame();
  }
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()]=false; });

// ── PARTICLES ────────────────────────────────────────────────────────────────
function spawnParticles(x,y,col,n,sm=1){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=(1+Math.random()*4)*sm;
    game.particles.push({x,y,z:5+Math.random()*20, vx:Math.cos(a)*s, vy:Math.sin(a)*s, vz:2+Math.random()*3,
      size:2+Math.random()*4, col, life:24+Math.random()*20, maxLife:44});
  }
}

// ── POWERS ───────────────────────────────────────────────────────────────────
function fireLightning(){
  if(P.lightCd>0) return;
  P.lightCd=P.lightMax;
  const a=Math.atan2(mY-P.y,mX-P.x);
  game.projectiles.push(mkProj(P.x,P.y,a,'player','lightning'));
  spawnParticles(P.x,P.y,'#ffff00',6);
}
function fireHeal(){
  if(P.healCd>0) return;
  if(game.lives>=3) return; // already full
  P.healCd=P.healMax;
  game.lives=Math.min(3, game.lives+1);
  // Green burst particles
  for(let i=0;i<36;i++) spawnParticles(P.x,P.y,'#44ff88',1,1.2);
  game.flashCol='#00ff44'; game.flashTimer=10;
  game.score+=5;
}
function doTeleport(){
  if(P.teleCd>0) return;
  P.teleCd=P.teleMax;
  spawnParticles(P.x,P.y,'#bb66ff',18);
  P.x=Math.max(22,Math.min(W-22,mX));
  P.y=Math.max(22,Math.min(H-22,mY));
  game.invTimer=35;
  spawnParticles(P.x,P.y,'#dd99ff',18);
  game.flashCol='#bb66ff'; game.flashTimer=6;
}
function doBlock(){
  if(P.blockCd>0||P.blockActive) return;
  P.blockActive=true;
  P.blockDuration=P.blockDurationMax;
  P.blockCd=P.blockCdMax;
  spawnParticles(P.x,P.y,'#4488ff',10,0.8);
  game.flashCol='#4488ff'; game.flashTimer=5;
}
function fireGear5(){
  if(P.gear5Cd>0) return;
  if(P.gear5Active) return;
  P.gear5Active=true;
  P.gear5Duration=P.gear5DurationMax;
  P.gear5Cd=P.gear5CdMax;
  P.speed=8.5;
  // Big sun burst
  game.halos.push({x:P.x,y:P.y,r:0,maxR:800,alpha:1,col:'#ffffff',w:28});
  game.halos.push({x:P.x,y:P.y,r:0,maxR:800,alpha:0.8,col:'#ffff88',w:14});
  spawnParticles(P.x,P.y,'#ffffff',50,2.5);
  game.flashCol='#ffffff'; game.flashTimer=20;
}
function fireHaki(){
  if(P.hakiCd>0) return;
  P.hakiCd=P.hakiCdMax;
  // Expand rings
  game.halos.push({x:P.x,y:P.y,r:0,maxR:700,alpha:1,col:'#330055',w:18});
  game.halos.push({x:P.x,y:P.y,r:0,maxR:700,alpha:0.6,col:'#8800cc',w:6});
  // Stun everything
  game.enemies.forEach(e=>{ e.frozen=210; spawnParticles(e.x,e.y,'#cc00ff',12); });
  if(game.boss){ game.boss.frozen=100; spawnParticles(game.boss.x,game.boss.y,'#cc00ff',25); }
  game.flashCol='#330055'; game.flashTimer=14;
  spawnParticles(P.x,P.y,'#cc00ff',35);
}

// ── PROJECTILE FACTORY ───────────────────────────────────────────────────────
function mkProj(x,y,a,owner,sub){
  const cfg={
    lightning:{spd:9, sz:8, dmg:50, col:'#ffff00'},   // was 25dmg sz6
    freeze:   {spd:6, sz:10,dmg:30, col:'#88ddff'},   // was 15dmg sz8
    punch:    {spd:13,sz:11,dmg:32, col:'#ff6600'},   // Gear 2nd rapid punch
    fireball: {spd:6, sz:8, dmg:18, col:'#ff6600'},
    fireball2:{spd:5, sz:14,dmg:45, col:'#ff3300'},   // dragon fire
    gear5fist:{spd:11,sz:18,dmg:120,col:'#ffffff'},   // Gear 5 cartoon giant fist
    boulder:  {spd:3, sz:10,dmg:20, col:'#887755'},
    rocket:   {spd:5, sz:8, dmg:35, col:'#ff4400'},
    water:    {spd:2.5,sz:7,dmg:15, col:'#4488ff'},
    coconut:  {spd:4, sz:6, dmg:12, col:'#886633'},
    feather:  {spd:5, sz:4, dmg:8,  col:'#ffaa44'},
  };
  const c=cfg[sub]||{spd:4,sz:5,dmg:10,col:'#f44'};
  return {x,y,z:12,angle:a,owner,sub,alive:true,t:0,...c};
}

// ── ENEMY ────────────────────────────────────────────────────────────────────
class Enemy {
  constructor(x,y,type){
    this.x=x; this.y=y; this.z=0; this.type=type;
    this.frozen=0; this.t=0; this.wobble=Math.random()*6;
    this.shootTimer=90+Math.random()*120;
    const cfg={
      townsperson:{hp:30, spd:1.3,sz:14,col:'#cc6622',tcol:'#ffcc99'},
      monkey:     {hp:16, spd:1.3,sz:12,col:'#8B4513',tcol:'#c8a060'},
      gorilla:    {hp:38, spd:0.6,sz:20,col:'#3a2a1a',tcol:'#6a4a2a'},
      panther:    {hp:45, spd:2.8,sz:15,col:'#111111',tcol:'#333333'},
      bird:       {hp:12, spd:1.6,sz:11,col:'#4488ff',tcol:'#2255cc'},
      flying_pig: {hp:22, spd:1.0,sz:16,col:'#ff88aa',tcol:'#ffaacc'},
      lavaliz:    {hp:35, spd:1.7,sz:14,col:'#cc3300',tcol:'#ff8833'},
      firehawk:   {hp:25, spd:2.4,sz:12,col:'#ff4400',tcol:'#ffcc22'},
    };
    const c=cfg[type]||cfg.townsperson;
    this.hp=c.hp; this.maxHp=c.hp; this.spd=c.spd;
    this.size=c.sz; this.col=c.col; this.tcol=c.tcol;
    this.angle=0;
  }
  update(){
    this.t++;
    if(this.frozen>0){ this.frozen--; return; }
    this.wobble+=0.055;
    const dx=P.x-this.x, dy=P.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>this.size+P.size){
      if(this.type==='bird'){ this.x+=(dx/dist)*this.spd+Math.cos(this.wobble)*0.9; this.y+=(dy/dist)*this.spd+Math.sin(this.wobble)*0.9; }
      else { this.x+=(dx/dist)*this.spd; this.y+=(dy/dist)*this.spd; }
    }
    // Bob up and down while moving
    this.z = Math.abs(Math.sin(this.t * 0.18)) * 7;
    // Panther pounce
    if(this.type==='panther'){
      if(!this.pounceTimer) this.pounceTimer=80+Math.random()*120;
      this.pounceTimer--;
      if(this.pounceTimer<=0){
        this.pounceTimer=100+Math.random()*120;
        this.pouncing=true; this.pounceFrames=18;
        this.pounceVx=Math.cos(this.angle)*18;
        this.pounceVy=Math.sin(this.angle)*18;
        this.z=20;
        spawnParticles(this.x,this.y,'#555',6,1.2);
      }
      if(this.pouncing){
        this.x+=this.pounceVx; this.y+=this.pounceVy;
        this.pounceVx*=0.82; this.pounceVy*=0.82;
        this.z=Math.max(0,this.z-1.1);
        this.pounceFrames--;
        if(this.pounceFrames<=0){ this.pouncing=false; this.z=0; spawnParticles(this.x,this.y,'#555',4,0.8); }
      }
    }
    if(['bird','flying_pig','firehawk'].includes(this.type)){
      this.shootTimer--;
      if(this.shootTimer<=0 && dist<320){
        this.shootTimer=70+Math.random()*60;
        const sub=this.type==='firehawk'?'fireball':this.type==='monkey'?'coconut':'feather';
        game.projectiles.push(mkProj(this.x,this.y,Math.atan2(dy,dx),'enemy',sub));
      }
    }
    this.x=Math.max(this.size,Math.min(W-this.size,this.x));
    this.y=Math.max(this.size,Math.min(H-this.size,this.y));
    this.angle=Math.atan2(dy,dx);
  }
  hit(d){ this.hp-=d; spawnParticles(this.x,this.y,this.col,5); return this.hp<=0; }
  draw(){
    const sy=sY(this.y,this.z);
    const frozenCol=this.frozen>0;
    // Shadow
    drawShadow(this.x,this.y,this.size*1.2,this.size*0.4);
    ctx.save(); ctx.translate(this.x,sy);
    if(frozenCol){ ctx.shadowColor='#88ddff'; ctx.shadowBlur=12; }
    this['draw_'+this.type]?.(frozenCol);
    ctx.restore();
    // HP bar
    if(this.hp<this.maxHp){
      const bw=this.size*2.2;
      ctx.fillStyle='#333'; ctx.fillRect(this.x-bw/2, sy-this.size*2.2-10, bw,4);
      ctx.fillStyle='#f44'; ctx.fillRect(this.x-bw/2, sy-this.size*2.2-10, bw*(this.hp/this.maxHp),4);
    }
  }
  draw_lavaliz(fr){
    const c=fr?'#88ccff':this.col, s=this.size;
    // Tail
    ctx.strokeStyle=fr?'#5599aa':'#993300'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-s,-2); ctx.quadraticCurveTo(-s*1.9,8,-s*1.7,18); ctx.stroke();
    // Body
    ctx.fillStyle=c; ctx.beginPath(); ctx.ellipse(0,2,s*1.1,s*0.7,0,0,Math.PI*2); ctx.fill();
    // Scales
    ctx.fillStyle=fr?'#6699bb':'#aa2200';
    for(let i=0;i<5;i++) ctx.fillRect(-s*0.7+i*s*0.3,-3,s*0.22,s*0.5);
    // Legs
    ctx.fillStyle=fr?'#7799bb':'#882200';
    ctx.beginPath(); ctx.ellipse(-s*0.5,s*0.6,4,7,-0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s*0.5,s*0.6,4,7,0.3,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle=c; ctx.beginPath(); ctx.arc(s*0.8,0,s*0.55,0,Math.PI*2); ctx.fill();
    // Eyes glow red
    ctx.fillStyle='#ff2200'; ctx.shadowColor='#ff4400'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(s*0.92,-s*0.2,3,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    // Tongue
    ctx.strokeStyle='#ff4400'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(s*1.3,0); ctx.lineTo(s*1.5,-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*1.3,0); ctx.lineTo(s*1.5,4); ctx.stroke();
    // Lava glow on belly
    ctx.fillStyle='rgba(255,100,0,0.25)'; ctx.beginPath(); ctx.ellipse(0,4,s*0.6,s*0.35,0,0,Math.PI*2); ctx.fill();
  }
  draw_firehawk(fr){
    const c=fr?'#88ccff':this.col, s=this.size;
    // Body
    ctx.fillStyle=c; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.75,0,0,Math.PI*2); ctx.fill();
    // Wings on fire
    const wc=fr?'#aaddff':'#ffcc00';
    ctx.fillStyle=wc;
    ctx.beginPath(); ctx.moveTo(-2,-3); ctx.bezierCurveTo(-14,-20,-30,-16,-28,-5); ctx.bezierCurveTo(-22,4,-6,2,-2,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(2,-3); ctx.bezierCurveTo(14,-20,30,-16,28,-5); ctx.bezierCurveTo(22,4,6,2,2,0); ctx.closePath(); ctx.fill();
    // Fire tips on wings
    if(!fr){
      ctx.fillStyle='#ff4400';
      ctx.beginPath(); ctx.moveTo(-28,-5); ctx.bezierCurveTo(-34,-12,-38,-6,-32,-1); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(28,-5); ctx.bezierCurveTo(34,-12,38,-6,32,-1); ctx.closePath(); ctx.fill();
      ctx.shadowColor='#ff8800'; ctx.shadowBlur=10;
      ctx.fillStyle='#ffaa00';
      ctx.beginPath(); ctx.arc(-31,-7,4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(31,-7,4,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
    // Head
    ctx.fillStyle=c; ctx.beginPath(); ctx.arc(s*0.62,-s*0.35,s*0.55,0,Math.PI*2); ctx.fill();
    // Fiery crest
    ctx.fillStyle=fr?'#aaddff':'#ff6600';
    ctx.beginPath(); ctx.moveTo(s*0.5,-s*0.65); ctx.quadraticCurveTo(s*0.4,-s*1.1,s*0.62,-s*0.9); ctx.quadraticCurveTo(s*0.8,-s*1.12,s*0.72,-s*0.65); ctx.closePath(); ctx.fill();
    // Beak

// ── BOSS ─────────────────────────────────────────────────────────────────────
class Boss {
  constructor(key){
    this.key=key; this.x=W/2; this.y=90; this.z=0;
    const cfg={
      gorilla_king: {hp:160, spd:1.0, sz:44, interval:90},
      pig_commander:{hp:160, spd:1.0, sz:40, interval:70},
      magma_dragon: {hp:600, spd:1.4, sz:58, interval:28},
    };
    const c=cfg[key];
    this.hp=c.hp; this.maxHp=c.hp; this.spd=c.spd; this.size=c.sz;
    this.shootTimer=c.interval; this.interval=c.interval;
    this.frozen=0; this.t=0; this.enraged=false; this.angle=0;
  }
  update(){
    this.t++;
    if(this.frozen>0){ this.frozen--; return; }
    if(this.hp<this.maxHp*0.5&&!this.enraged){
      this.enraged=true; this.spd*=1.5;
      this.interval=Math.max(18,this.interval-20);
      spawnParticles(this.x,this.y,'#f00',25);
    }
    if(this.key==='gorilla_king'){
      this.x=W/2+Math.sin(this.t*0.02)*(W/2-95);
      this.y=90+Math.abs(Math.sin(this.t*0.035))*140;
    } else if(this.key==='magma_dragon'){
      this.x=W/2+Math.cos(this.t*0.018)*(W/2-100);
      this.y=H/2+Math.sin(this.t*0.022)*(H/2-100);
      if(this.enraged){
        // Charge at player
        const dx=P.x-this.x,dy=P.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>60){ this.x+=(dx/d)*this.spd*2.5; this.y+=(dy/d)*this.spd*2.5; }
      }
    } else if(this.key==='pig_commander'){
      this.x=W/2+Math.sin(this.t*0.025)*(W/2-95);
      this.y=80+Math.abs(Math.sin(this.t*0.04))*165;
    } else {
      const dx=P.x-this.x, dy=P.y-this.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>90){ this.x+=(dx/d)*this.spd; this.y+=(dy/d)*this.spd; }
    }
    this.z=Math.abs(Math.sin(this.t*0.14))*10;
    this.shootTimer--;
    if(this.shootTimer<=0){ this.shootTimer=this.interval; this.shoot(); }
    this.angle=Math.atan2(P.y-this.y,P.x-this.x);
    this.x=Math.max(this.size,Math.min(W-this.size,this.x));
    this.y=Math.max(this.size,Math.min(H-this.size,this.y));
  }
  shoot(){
    const b=Math.atan2(P.y-this.y,P.x-this.x);
    if(this.key==='gorilla_king'){
      [-0.35,0,0.35].forEach(o=>game.projectiles.push(mkProj(this.x,this.y,b+o,'boss','boulder')));
      if(this.enraged) [-0.7,0.7].forEach(o=>game.projectiles.push(mkProj(this.x,this.y,b+o,'boss','boulder')));
    } else if(this.key==='magma_dragon'){
      this.x=W/2+Math.cos(this.t*0.018)*(W/2-100);
      this.y=H/2+Math.sin(this.t*0.022)*(H/2-100);
      if(this.enraged){
        // Charge at player
        const dx=P.x-this.x,dy=P.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>60){ this.x+=(dx/d)*this.spd*2.5; this.y+=(dy/d)*this.spd*2.5; }
      }
    } else if(this.key==='pig_commander'){
      game.projectiles.push(mkProj(this.x,this.y,b,'boss','rocket'));
      if(this.enraged) [-0.45,0.45].forEach(o=>game.projectiles.push(mkProj(this.x,this.y,b+o,'boss','rocket')));
    } else if(this.key==='magma_dragon'){
      // Spiral fireball spread + aimed shot
      const n=this.enraged?10:6;
      for(let i=0;i<n;i++){
        const a=(Math.PI*2/n)*i + this.t*0.04;
        game.projectiles.push(mkProj(this.x,this.y,a,'boss','fireball2'));
      }
      game.projectiles.push(mkProj(this.x,this.y,b,'boss','fireball2'));
      if(this.enraged) [-0.3,0.3].forEach(o=>game.projectiles.push(mkProj(this.x,this.y,b+o,'boss','fireball2')));
    }
  }
  hit(d){ this.hp-=d; spawnParticles(this.x,this.y,'#ff8800',8); return this.hp<=0; }
  draw(){
    const sy=sY(this.y,this.z);
    drawShadow(this.x,this.y,this.size*1.3,this.size*0.45);
    ctx.save(); ctx.translate(this.x,sy);
    if(this.frozen>0){ ctx.shadowColor='#88ddff'; ctx.shadowBlur=20; }
    if(this.enraged) { ctx.shadowColor='#ff2200'; ctx.shadowBlur=28; }
    ctx.rotate(this.angle);
    this['draw_'+this.key]?.();
    ctx.restore();
    this.drawBar();
  }
  draw_gorilla_king(){
    const s=this.size;
    ctx.fillStyle='#1a0f0a'; ctx.beginPath(); ctx.ellipse(-s*0.7,s*0.6,12,6,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s*0.7,s*0.6,12,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a1a0a'; ctx.beginPath(); ctx.arc(0,s*0.1,s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5a3a2a'; ctx.beginPath(); ctx.ellipse(0,s*0.1,s*0.58,s*0.68,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a1a0a'; ctx.beginPath(); ctx.arc(0,-s*0.52,s*0.73,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFD700';
    ctx.beginPath();
    ctx.moveTo(-17,-s-8); ctx.lineTo(-17,-s+14); ctx.lineTo(-9,-s+4); ctx.lineTo(0,-s+14);
    ctx.lineTo(9,-s+4); ctx.lineTo(17,-s+14); ctx.lineTo(17,-s-8); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#f00'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(-13,-s*0.78); ctx.lineTo(-5,-s*0.66); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(13,-s*0.78); ctx.lineTo(5,-s*0.66); ctx.stroke();
    ctx.fillStyle='#f22'; ctx.beginPath(); ctx.arc(-6,-s*0.68,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-s*0.68,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff8800'; ctx.beginPath(); ctx.arc(-5,-s*0.7,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-s*0.7,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillRect(-10,-s*0.35,5,8); ctx.fillRect(5,-s*0.35,5,8);
    ctx.fillStyle='#2a1a0a';
    ctx.beginPath(); ctx.arc(-s*0.88,s*0.28,11,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(s*0.88,s*0.28,11,0,Math.PI*2); ctx.fill();
    if(this.enraged){ ctx.strokeStyle='#f00'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,s+12,0,Math.PI*2); ctx.stroke(); }
  }
  draw_pig_commander(){
    const s=this.size;
    ctx.fillStyle='#ff88aa'; ctx.beginPath(); ctx.arc(0,0,s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#334488'; ctx.fillRect(-s*0.62,-5,s*1.24,s*0.92);
    ctx.fillStyle='#FFD700';
    [-s*0.3,0,s*0.3].forEach(bx=>{ ctx.beginPath(); ctx.arc(bx,s*0.2,3.5,0,Math.PI*2); ctx.fill(); });

// ── COLLISION ────────────────────────────────────────────────────────────────
function checkCollisions(){
  game.projectiles.forEach(p=>{
    if(p.owner!=='player'||!p.alive) return;
    game.enemies.forEach(e=>{
      if(!p.alive) return;
      const dx=p.x-e.x,dy=p.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy)<p.sz+e.size){
        p.alive=false;
        if(p.sub==='freeze'){ e.frozen=130; spawnParticles(e.x,e.y,'#88ddff',8); }
        if(e.hit(p.dmg)){ game.enemies=game.enemies.filter(x=>x!==e); game.score+=10; spawnParticles(e.x,e.y,e.col,15); }
      }
    });
    if(game.boss&&p.alive){
      const dx=p.x-game.boss.x,dy=p.y-game.boss.y;
      if(Math.sqrt(dx*dx+dy*dy)<p.sz+game.boss.size){
        p.alive=false;
        if(p.sub==='freeze') game.boss.frozen=70;
        if(game.boss.hit(p.dmg)){
          const bk=game.boss.key;
          const bx2=game.boss.x, by2=game.boss.y; if(bk==='magma_dragon'){
            for(let i=0;i<8;i++){
              setTimeout(()=>{
                const ex=(game.boss?game.boss.x:bx2)+(Math.random()-0.5)*140;
                const ey=(game.boss?game.boss.y:by2)+(Math.random()-0.5)*100;
                spawnParticles(ex,ey,'#ff4400',18,2.2);
                spawnParticles(ex,ey,'#ffcc00',10,1.6);
                spawnParticles(ex,ey,'#ff8800',8,1.2);
              },i*90);
            }
            game.halos.push({x:bx2,y:by2,r:0,maxR:700,alpha:1,col:'#ff4400',w:26});
            game.halos.push({x:bx2,y:by2,r:0,maxR:700,alpha:0.7,col:'#ffcc00',w:12});
            game.flashCol='#ff4400'; game.flashTimer=22;
            game.bossDefeated=true;
            setTimeout(()=>{ game.state='levelcomplete'; },2000);
          } else if(bk==='gorilla_king'){
            for(let i=0;i<6;i++){
              setTimeout(()=>{
                spawnParticles(game.boss?game.boss.x:W/2,game.boss?game.boss.y:H/2,'#ff4400',20,2);
                spawnParticles(game.boss?game.boss.x:W/2,game.boss?game.boss.y:H/2,'#ffaa00',15,1.5);
                spawnParticles(game.boss?game.boss.x:W/2,game.boss?game.boss.y:H/2,'#ffff00',10,1);
              },i*80);
            }
            game.halos.push({x:bx2,y:by2,r:0,maxR:600,alpha:1,col:'#ff4400',w:22});
            game.halos.push({x:bx2,y:by2,r:0,maxR:600,alpha:0.7,col:'#ffaa00',w:10});
            game.flashCol='#ff4400'; game.flashTimer=18;
          } else {
            spawnParticles(bx2,by2,'#FFD700',45);
          }
          game.score+=100;
          game.boss=null;
          game.bossDefeated=true;
          setTimeout(()=>{ game.state='levelcomplete'; },1600);
        }
      }
    }
  });
  if(game.invTimer>0) return;
  game.projectiles.forEach(p=>{
    if((p.owner!=='enemy'&&p.owner!=='boss')||!p.alive) return;
    const dx=p.x-P.x,dy=p.y-P.y;
    if(Math.sqrt(dx*dx+dy*dy)<p.sz+P.size){ p.alive=false; playerHit(); }
  });
  game.enemies.forEach(e=>{ const dx=e.x-P.x,dy=e.y-P.y; if(Math.sqrt(dx*dx+dy*dy)<e.size+P.size+2) playerHit(); });
  if(game.boss){ const dx=game.boss.x-P.x,dy=game.boss.y-P.y; if(Math.sqrt(dx*dx+dy*dy)<game.boss.size+P.size) playerHit(); }
}
function playerHit(){
  if(game.invTimer>0) return;
  game.lives--; spawnParticles(P.x,P.y,'#f00',22);
  game.invTimer=80; game.flashCol='#f00'; game.flashTimer=8;
  if(game.lives<=0) game.state='gameover';
}

// ── WAVE SPAWN ───────────────────────────────────────────────────────────────
function spawnWave(){
  const lv=LEVELS[game.level];
  const cnt=lv.enemyCount[Math.min(game.wave,lv.enemyCount.length-1)];
  for(let i=0;i<cnt;i++){
    let x,y;
    const s=Math.floor(Math.random()*4);
    if(s===0){x=Math.random()*W;y=-20;} else if(s===1){x=W+20;y=Math.random()*H;}
    else if(s===2){x=Math.random()*W;y=H+20;} else {x=-20;y=Math.random()*H;}
    let type=lv.enemyType;
    if(game.level===1){
      const r=Math.random();
      type = r<0.45?'monkey': r<0.72?'gorilla':'panther';
    }
    if(game.level===2) type=Math.random()<0.6?'bird':'flying_pig';
    if(game.level===4){ const r=Math.random(); type=r<0.55?'lavaliz':'firehawk'; }
    game.enemies.push(new Enemy(x,y,type));
  }
}

  ctx.fillStyle='#4a3a1e';
  for(let y=0;y<H;y+=42) for(let x=(y%84===0?0:21);x<W;x+=42) ctx.fillRect(x,y,40,40);
  ctx.strokeStyle='#2a1a0a'; ctx.lineWidth=1;
  for(let y=0;y<H;y+=42){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  for(let x=0;x<W;x+=42){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
}
function drawJungleFloor(){
  ctx.fillStyle='#133313'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1a4a1a';

function drawSkyFloor(){

// ── ENV OBJECT DRAW ───────────────────────────────────────────────────────────
function drawVolcanoFloor(){
  // Dark basalt
  ctx.fillStyle='#1a0505'; ctx.fillRect(0,0,W,H);
  // Cracked lava ground
  ctx.strokeStyle='#ff4400'; ctx.lineWidth=1.5;
  const cracks=[[50,80,150,120],[200,200,280,160],[400,100,500,140],[600,80,700,130],
    [100,400,200,440],[350,480,450,510],[550,400,650,380],[700,450,800,500],
    [300,300,350,280],[500,350,600,370]];
  cracks.forEach(([x1,y1,x2,y2])=>{
    ctx.globalAlpha=0.35+Math.sin(Date.now()*0.003)*0.15;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  ctx.globalAlpha=1;
  // Ground stones
  ctx.fillStyle='#2a0808';
  for(let i=0;i<25;i++){
    ctx.beginPath(); ctx.ellipse((i*137+80)%W,(i*97+60)%(H),18+i%12,10+i%7,i*0.3,0,Math.PI*2); ctx.fill();
  }
}

function drawEnvObj(o){
  if(o.type==='building'||o.type==='stall') drawBuilding3D(o);
  else if(o.type==='volrock')  drawVolRock(o);
  else if(o.type==='lavapool') drawLavaPool(o);
  else if(o.type==='tree')   drawTree3D(o);
  else if(o.type==='lamp')   drawLamp3D(o);
  else if(o.type==='cloud')  drawCloud3D(o);
  else if(o.type==='rock')   drawRock3D(o);
  else if(o.type==='drain')  drawDrain3D(o);
}

function drawVolRock(o){
  drawShadow(o.x,o.y+30,28,10,0.35);
  const rg=ctx.createRadialGradient(o.x-5,o.y-5,4,o.x,o.y,32);
  rg.addColorStop(0,'#553333'); rg.addColorStop(1,'#1a0505');
  ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(o.x,o.y,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#331111'; ctx.beginPath(); ctx.arc(o.x+8,o.y+8,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#442222'; ctx.beginPath(); ctx.arc(o.x-4,o.y-5,20,0,Math.PI*2); ctx.fill();

let lavaT=0;
function drawLavaPool(o){
  lavaT+=0.008;
  const lg=ctx.createRadialGradient(o.x,o.y,4,o.x,o.y,48);
  lg.addColorStop(0,'#ffcc00'); lg.addColorStop(0.3,'#ff4400'); lg.addColorStop(1,'rgba(180,0,0,0)');
  ctx.fillStyle=lg; ctx.beginPath(); ctx.ellipse(o.x,o.y,48,22,0,0,Math.PI*2); ctx.fill();
  // Bubbles
  [[-12,4],[8,-6],[18,10],[-5,14]].forEach(([dx,dy],i)=>{
    const pulse=Math.abs(Math.sin(lavaT*2+i));
    ctx.fillStyle=`rgba(255,${150+Math.floor(pulse*80)},0,${0.5+pulse*0.4})`;
    ctx.beginPath(); ctx.arc(o.x+dx,o.y+dy,3+pulse*3,0,Math.PI*2); ctx.fill();
  });
}

function drawBuilding3D(b){
  const sideH = b.wallH * PERSP;
  // South (front) face — darker strip below bottom edge
  ctx.fillStyle=b.side||'#3a2a10';
  ctx.fillRect(b.x, b.y+b.h-sideH, b.w, sideH+4);
  // Top face
  ctx.fillStyle=b.col;
  ctx.fillRect(b.x,b.y,b.w,b.h);
  // Windows
  for(let wy=b.y+16;wy<b.y+b.h-30;wy+=34){
    for(let wx=b.x+10;wx<b.x+b.w-16;wx+=28){
      ctx.fillStyle=Math.sin(wx*wy*0.001)>0?'#ffdd88':'#111';
      ctx.fillRect(wx,wy,16,18);
      ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(wx,wy,16,18);
    }
  }
  // Roof edge highlight
  ctx.strokeStyle='rgba(255,220,150,0.15)'; ctx.lineWidth=1;
  ctx.strokeRect(b.x,b.y,b.w,b.h);
}

function drawTree3D(o){
  const tH=60;
  // Trunk shadow
  drawShadow(o.x,o.y+50,22,8,0.4);
  // Trunk (3D - has south face visible)
  ctx.fillStyle='#4a2a0a'; ctx.fillRect(o.x-7,o.y+22,14,38);

  // Canopy shadow on ground
  drawShadow(o.x,o.y+18,38,14,0.25);
  // Canopy layers (3D stack)
  ctx.fillStyle='#0b230b'; ctx.beginPath(); ctx.arc(o.x,o.y-5,48,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a4a1a'; ctx.beginPath(); ctx.arc(o.x-8,o.y-13,33,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#256325'; ctx.beginPath(); ctx.arc(o.x,o.y-20,22,0,Math.PI*2); ctx.fill();
  // Rim highlight
  ctx.strokeStyle='rgba(100,200,100,0.2)'; ctx.lineWidth=1;

}

function drawLamp3D(o){

function drawCloud3D(o){

function drawDrain3D(o){

// ── LUFFY DRAW ────────────────────────────────────────────────────────────────
function drawLuffy(){
  if(game.invTimer>0 && Math.floor(game.invTimer/5)%2===0) return;

  const sy = sY(P.y, P.z);
  // Shadow on ground
  drawShadow(P.x, P.y, 22, 9, 0.38);

  ctx.save();
  ctx.translate(P.x, sy);
  ctx.rotate(P.facing);

  // Block shield aura
  if(P.blockActive){
    const bpulse=0.7+Math.sin(Date.now()*0.025)*0.3;

    ctx.strokeStyle=`rgba(68,136,255,${bpulse*0.9})`;
    ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(0,0,P.size+10,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=`rgba(68,136,255,${bpulse*0.12})`;

    ctx.strokeStyle=`rgba(255,255,200,${g5p})`;
    ctx.lineWidth=5;

    ctx.strokeStyle=`rgba(255,255,255,${g5p*0.4})`;
    ctx.lineWidth=10;
    ctx.beginPath(); ctx.arc(0,0,P.size+26,0,Math.PI*2); ctx.stroke();

  }

  // ─ Legs & feet ─
  ctx.fillStyle = '#3355aa'; // blue shorts
  ctx.fillRect(-10, 14, 9, 14);
  ctx.fillRect(1,  14, 9, 14);
  ctx.fillStyle = '#a08050'; // sandals
  ctx.beginPath(); ctx.ellipse(-5, 28, 7, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 5, 28, 7, 4, 0, 0, Math.PI*2); ctx.fill();

  // ─ Shorts ─
  ctx.fillStyle='#3355aa';
  ctx.fillRect(-12,4,24,14);
  // Belt / hem stripe
  ctx.strokeStyle='#ffdd44'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-12,5); ctx.lineTo(12,5); ctx.stroke();

  // ─ Body / open vest ─

  ctx.fillRect(-12,-14,24,20);
  // Open chest gap (vest is open)
  ctx.fillStyle='#f0cc99'; // skin
  ctx.fillRect(-4,-14,8,18);
  // Scar on chest (Luffy's X scar)
  ctx.strokeStyle='#cc6644'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-3,-2); ctx.lineTo(3,4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3,-2); ctx.lineTo(-3,4); ctx.stroke();

  // ─ Vest lapels ─
  ctx.fillStyle='#cc2200';
  ctx.beginPath(); ctx.moveTo(-12,-14); ctx.lineTo(-4,-14); ctx.lineTo(-4,-4); ctx.lineTo(-12,2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(12,-14); ctx.lineTo(4,-14); ctx.lineTo(4,-4); ctx.lineTo(12,2); ctx.closePath(); ctx.fill();

  // ─ Arms (stretched forward when attacking) ─
  ctx.fillStyle='#f0cc99';
  ctx.fillRect(-17,-8,7,10); // left arm
  ctx.fillRect(10,-8,7,10);  // right arm
  ctx.fillStyle='#cc2200';
  ctx.fillRect(-17,-12,7,6); // left sleeve
  ctx.fillRect(10,-12,7,6);  // right sleeve

  // ─ Neck ─
  ctx.fillStyle=P.gear5Active?'#ffffff':'#f0cc99'; ctx.fillRect(-5,-18,10,6);

  ctx.fillStyle=P.gear5Active?'#ffffff':'#f0cc99';
  ctx.beginPath(); ctx.arc(0,-28,13,0,Math.PI*2); ctx.fill();

  // ─ Hair ─ white fluffy clouds in Gear 5, black normally
  ctx.fillStyle=P.gear5Active?'#ffffff':'#111';
  if(P.gear5Active){ ctx.shadowColor='#ffffff'; ctx.shadowBlur=12; }
  ctx.beginPath(); ctx.arc(0,-36,12,Math.PI,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-8,-38,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-3,-40,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-39,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-37,4,0,Math.PI*2); ctx.fill();

    ctx.beginPath(); ctx.arc(13,-36,6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-44,7,0,Math.PI*2); ctx.fill();
  }

  // ─ Face features ─
  if(P.gear5Active){

    ctx.fillStyle='#ffffff'; ctx.shadowColor='#ffffff'; ctx.shadowBlur=16;

    ctx.beginPath(); ctx.arc(5,-28,3.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#000';

    ctx.beginPath(); ctx.arc(5,-28,1.5,0,Math.PI*2); ctx.fill();

    ctx.strokeStyle='#888'; ctx.lineWidth=1;

  } else {

    ctx.beginPath(); ctx.arc(-5,-28,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-28,2.5,0,Math.PI*2); ctx.fill();

    ctx.beginPath(); ctx.arc(-4.5,-28.5,1,0,Math.PI*2); ctx.fill();

    ctx.strokeStyle='#cc5533'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(-7,-24); ctx.lineTo(-2,-21); ctx.stroke();

    ctx.strokeStyle='#aa3300'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,-25,6,0.1,Math.PI-0.1); ctx.stroke();
  }

  // ─ STRAW HAT ─ (the iconic one!)
  // Hat shadow on head
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0,-38,28,6,0,0,Math.PI*2); ctx.fill();
  // Brim underside
  ctx.fillStyle='#b89040';
  ctx.beginPath(); ctx.ellipse(0,-40,28,7,0,0,Math.PI*2); ctx.fill();

  ctx.beginPath(); ctx.ellipse(0,-42,28,6,0,0,Math.PI*2); ctx.fill();

  ctx.beginPath();
  ctx.moveTo(-14,-42);
  ctx.quadraticCurveTo(-12,-62,0,-64);
  ctx.quadraticCurveTo(12,-62,14,-42);
  ctx.closePath(); ctx.fill();
  // Red ribbon band
  ctx.fillStyle='#cc0000';
  ctx.beginPath(); ctx.ellipse(0,-43,14,4,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='rgba(255,255,200,0.25)';
  ctx.beginPath(); ctx.ellipse(-4,-55,6,8,0.3,0,Math.PI*2); ctx.fill();

  ctx.restore();
  drawPowerRings();
}

function drawPowerRings(){
  const cx=P.x, cy=P.y, r=P.size+11;
  const drawArc=(pct,radius,full,dim)=>{
    ctx.strokeStyle=pct>=1?full:dim; ctx.lineWidth=2.8;
    ctx.shadowColor=full; ctx.shadowBlur=pct>=1?8:0;
    ctx.beginPath(); ctx.arc(cx,cy,radius,-Math.PI/2,-Math.PI/2+pct*Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
  };
  drawArc(1-P.lightCd/P.lightMax,   r,    '#ffff00','#444400');
  drawArc(1-P.healCd/P.healMax,     r+5,  '#44ff88','#114422');
  drawArc(1-P.teleCd/P.teleMax,     r+10, '#cc88ff','#442255');
  drawArc(1-P.blockCd/P.blockCdMax, r+16, '#4488ff','#112244');
  // Gear 5 ring
  if(P.gear5Active){
    const pct=P.gear5Duration/P.gear5DurationMax;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=5;
    ctx.shadowColor='#ffffff'; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.arc(cx,cy,r+22,-Math.PI/2,-Math.PI/2+pct*Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
  } else {
    drawArc(1-P.gear5Cd/P.gear5CdMax, r+22, '#ffffff','#333333');
  }
  drawArc(1-P.hakiCd/P.hakiCdMax, r+28, '#aa00ff','#330044');
}

// ── PROJECTILE DRAW ───────────────────────────────────────────────────────────
function drawProjectile(p){
  const sy=sY(p.y,p.z);
  drawShadow(p.x,p.y,p.sz*0.9,p.sz*0.35,0.2);
  ctx.save(); ctx.translate(p.x,sy); ctx.rotate(p.angle);
  if(p.sub==='lightning'){
    ctx.shadowColor='#ffff00'; ctx.shadowBlur=16; ctx.fillStyle='#ffff00';
    ctx.beginPath(); ctx.moveTo(0,-3); ctx.lineTo(10,0); ctx.lineTo(4,3); ctx.lineTo(12,0); ctx.lineTo(5,-2); ctx.closePath(); ctx.fill();
  } else if(p.sub==='freeze'){
    ctx.shadowColor='#88ddff'; ctx.shadowBlur=14; ctx.fillStyle='#88ddff';
    ctx.beginPath(); ctx.arc(0,0,p.sz,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
    // Snowflake arms
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5;
    for(let i=0;i<6;i++){ ctx.save(); ctx.rotate(i*Math.PI/3); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-p.sz); ctx.stroke(); ctx.restore(); }
  } else if(p.sub==='fireball'||p.sub==='fireball2'){
    const isLarge=p.sub==='fireball2';
    ctx.shadowColor='#ff4400'; ctx.shadowBlur=isLarge?20:12;
    const fg=ctx.createRadialGradient(0,0,0,0,0,p.sz);
    fg.addColorStop(0,'#ffff88'); fg.addColorStop(0.4,'#ff8800'); fg.addColorStop(1,'rgba(200,0,0,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(0,0,p.sz*1.4,0,Math.PI*2); ctx.fill();
    // Core
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,p.sz*0.45,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  } else if(p.sub==='gear5fist'){
    ctx.shadowColor='#ffffff'; ctx.shadowBlur=22;
    // Cartoon giant white fist
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.ellipse(0,0,p.sz,p.sz*0.82,0,0,Math.PI*2); ctx.fill();
    // Knuckle lines
    ctx.strokeStyle='#cccccc'; ctx.lineWidth=2;
    [-5,0,5].forEach(kx=>{ ctx.beginPath(); ctx.moveTo(kx,-p.sz*0.5); ctx.lineTo(kx,-p.sz*0.9); ctx.stroke(); });
    // Glow ring
    ctx.strokeStyle='rgba(255,255,180,0.6)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.ellipse(0,0,p.sz*1.5,p.sz*1.2,0,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.shadowColor='#ff6600'; ctx.shadowBlur=14; ctx.fillStyle='#ff8800';
    // Fist shape
    ctx.beginPath(); ctx.ellipse(0,0,p.sz,p.sz*0.75,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffcc88';
    ctx.beginPath(); ctx.ellipse(-2,-2,p.sz*0.55,p.sz*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,100,0,0.5)';
    ctx.beginPath(); ctx.arc(0,0,p.sz*1.4,0,Math.PI*2); ctx.fill();
  } else if(p.sub==='rocket'){
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=14; ctx.fillStyle='#ff4400';
    ctx.beginPath(); ctx.moveTo(p.sz+6,0); ctx.lineTo(-p.sz,-5); ctx.lineTo(-p.sz+3,0); ctx.lineTo(-p.sz,5); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(-p.sz,0,5,0,Math.PI*2); ctx.fill();
  } else if(p.sub==='boulder'){
    ctx.fillStyle='#887755'; ctx.beginPath(); ctx.arc(0,0,p.sz,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#aaa'; ctx.beginPath(); ctx.arc(-2,-2,2.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#665533'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(0,0,p.sz,0,Math.PI*2); ctx.stroke();
  } else if(p.sub==='water'){
    ctx.fillStyle=`rgba(68,136,255,${0.6+Math.sin(p.t*0.2)*0.3})`;
    ctx.beginPath(); ctx.arc(0,0,p.sz,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(150,200,255,0.6)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,0,p.sz,0,Math.PI*2); ctx.stroke();
  } else {
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(0,0,p.sz,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0; ctx.restore();
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.font='bold 14px Courier New'; ctx.fillStyle='#fff'; ctx.fillText('LIVES:',10,24);
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<game.lives?'#ff4444':'#333';
    ctx.beginPath(); ctx.arc(74+i*26,17,9,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='#ffdd44'; ctx.font='bold 13px Courier New';
  ctx.textAlign='right'; ctx.fillText('SCORE: '+game.score,W-10,24); ctx.textAlign='left';
  ctx.fillStyle=LEVELS[game.level]?.col||'#fff'; ctx.font='bold 12px Courier New';
  ctx.textAlign='center'; ctx.fillText(LEVELS[game.level]?.name?.toUpperCase()||'',W/2,18); ctx.textAlign='left';
  if(game.state==='playing'){
    ctx.fillStyle='#aaa'; ctx.font='11px Courier New'; ctx.textAlign='center';
    ctx.fillText(`WAVE ${game.wave+1} / ${game.maxWaves}   ENEMIES: ${game.enemies.length}`,W/2,36);
    ctx.textAlign='left';
  }
  const powers=[
    {key:'LMB',  name:'LIGHTNING', cd:P.lightCd,      max:P.lightMax,        col:'#ffff00'},
    {key:'RMB',  name:'HEAL',      cd:P.healCd,       max:P.healMax,         col:'#44ff88'},
    {key:'SPACE',name:'TELEPORT',  cd:P.teleCd,       max:P.teleMax,         col:'#cc88ff'},
    {key:'Q',    name:'BLOCK',     cd:P.blockCd,      max:P.blockCdMax,      col:'#4488ff', active:P.blockActive, actCol:'#2266cc'},
    {key:'R',    name:'GEAR 5TH',  cd:P.gear5Cd,      max:P.gear5CdMax,      col:'#ffffff', active:P.gear5Active, actCol:'#ffffcc'},
    {key:'E',    name:'HAKI',      cd:P.hakiCd,       max:P.hakiCdMax,       col:'#aa00ff'},
  ];
  const bTotal=powers.length*115, bStart=W/2-bTotal/2;
  powers.forEach((p,i)=>{
    const bx=bStart+i*115, by=H-38;
    const rdy=p.cd<=0;
    const isActive=p.active;
    ctx.fillStyle=isActive?p.actCol:(rdy?p.col:'#1a1a1a');
    if(isActive){ ctx.shadowColor=p.actCol; ctx.shadowBlur=12; }
    ctx.fillRect(bx,by,112,24);
    ctx.shadowBlur=0;
    ctx.fillStyle=isActive?'#fff':(rdy?'#000':'#555');
    ctx.font='bold 8.5px Courier New'; ctx.textAlign='center';
    ctx.fillText(`[${p.key}] ${p.name}`,bx+56,by+16);
    if(!rdy&&!isActive){ ctx.fillStyle=p.col; ctx.fillRect(bx,by+22,112*(1-p.cd/p.max),2); }
    if(isActive){
      const pct= P.gear5Duration/P.gear5DurationMax;
      ctx.fillStyle='#ffff00'; ctx.fillRect(bx,by+22,112*pct,2);
    }
  });
  ctx.textAlign='left';
  if(game.flashTimer>0){
    const rgb=game.flashCol==='#f00'?'255,0,0':'170,0,255';
    ctx.fillStyle=`rgba(${rgb},${game.flashTimer/8*0.28})`;
    ctx.fillRect(0,0,W,H); game.flashTimer--;
  }
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function drawLuffyPortrait(cx, cy, scale){
  const s = scale;
  ctx.save();
  ctx.translate(cx, cy);

  // ── Body shadow ──
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(4*s,90*s,55*s,18*s,0,0,Math.PI*2); ctx.fill();

  // ── Legs ──
  ctx.fillStyle='#3355aa';
  ctx.fillRect(-28*s,40*s,22*s,55*s);  // left leg
  ctx.fillRect(6*s,40*s,22*s,55*s);    // right leg
  // Sandals
  ctx.fillStyle='#a08050';
  ctx.beginPath(); ctx.ellipse(-17*s,95*s,18*s,9*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(17*s,95*s,18*s,9*s,0,0,Math.PI*2); ctx.fill();
  // Shorts hem
  ctx.strokeStyle='#ffdd44'; ctx.lineWidth=3*s;
  ctx.beginPath(); ctx.moveTo(-30*s,42*s); ctx.lineTo(30*s,42*s); ctx.stroke();

  // ── Shorts ──
  ctx.fillStyle='#3355aa';
  ctx.fillRect(-30*s,10*s,60*s,35*s);

  // ── Red vest body ──
  ctx.fillStyle='#cc2200';
  ctx.fillRect(-30*s,-40*s,60*s,55*s);
  // Vest open chest gap
  ctx.fillStyle='#f0cc99';
  ctx.fillRect(-10*s,-40*s,20*s,50*s);
  // Chest scar
  ctx.strokeStyle='#cc6644'; ctx.lineWidth=2*s;
  ctx.beginPath(); ctx.moveTo(-7*s,-10*s); ctx.lineTo(7*s,5*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7*s,-10*s); ctx.lineTo(-7*s,5*s); ctx.stroke();
  // Vest lapels
  ctx.fillStyle='#cc2200';
  ctx.beginPath(); ctx.moveTo(-30*s,-40*s); ctx.lineTo(-10*s,-40*s); ctx.lineTo(-10*s,-5*s); ctx.lineTo(-30*s,5*s); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(30*s,-40*s); ctx.lineTo(10*s,-40*s); ctx.lineTo(10*s,-5*s); ctx.lineTo(30*s,5*s); ctx.closePath(); ctx.fill();

  // ── Arms ──
  ctx.fillStyle='#f0cc99';
  ctx.fillRect(-50*s,-30*s,20*s,32*s);
  ctx.fillRect(30*s,-30*s,20*s,32*s);
  ctx.fillStyle='#cc2200';
  ctx.fillRect(-50*s,-40*s,20*s,16*s);
  ctx.fillRect(30*s,-40*s,20*s,16*s);
  // Fists
  ctx.fillStyle='#f0cc99';
  ctx.beginPath(); ctx.arc(-40*s,8*s,13*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(40*s,8*s,13*s,0,Math.PI*2); ctx.fill();
  // Knuckles
  ctx.strokeStyle='#cc8855'; ctx.lineWidth=1.5*s;
  [-8,-3,3,8].forEach(kx=>{ ctx.beginPath(); ctx.moveTo((-40+kx)*s,-1*s); ctx.lineTo((-40+kx)*s,-7*s); ctx.stroke(); });
  [-8,-3,3,8].forEach(kx=>{ ctx.beginPath(); ctx.moveTo((40+kx)*s,-1*s); ctx.lineTo((40+kx)*s,-7*s); ctx.stroke(); });

  // ── Neck ──
  ctx.fillStyle='#f0cc99'; ctx.fillRect(-12*s,-50*s,24*s,14*s);

  // ── Head ──
  ctx.fillStyle='#f0cc99';
  ctx.beginPath(); ctx.arc(0,-75*s,42*s,0,Math.PI*2); ctx.fill();

  // ── Black hair ──
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(0,-100*s,36*s,Math.PI,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-22*s,-98*s,14*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-10*s,-108*s,12*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4*s,-110*s,14*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18*s,-106*s,13*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(28*s,-98*s,11*s,0,Math.PI*2); ctx.fill();

  // ── Eyes ──
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-16*s,-78*s,8*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(16*s,-78*s,8*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-13*s,-81*s,3*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(19*s,-81*s,3*s,0,Math.PI*2); ctx.fill();

  // ── Scar under left eye ──
  ctx.strokeStyle='#cc5533'; ctx.lineWidth=3*s;
  ctx.beginPath(); ctx.moveTo(-22*s,-68*s); ctx.lineTo(-8*s,-60*s); ctx.stroke();

  // ── Big grin ──
  ctx.strokeStyle='#aa3300'; ctx.lineWidth=3.5*s;
  ctx.beginPath(); ctx.arc(0,-64*s,20*s,0.1,Math.PI-0.1); ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.fillRect(-18*s,-64*s,11*s,10*s);
  ctx.fillRect(-5*s,-64*s,10*s,10*s);
  ctx.fillRect(7*s,-64*s,11*s,10*s);
  ctx.strokeStyle='#cc8855'; ctx.lineWidth=1.5*s;
  [-13,-4,9].forEach(tx=>{ ctx.beginPath(); ctx.moveTo(tx*s,-64*s); ctx.lineTo(tx*s,-55*s); ctx.stroke(); });

  // ── STRAW HAT ──
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(0,-112*s,85*s,20*s,0,0,Math.PI*2); ctx.fill();
  // Brim underside
  ctx.fillStyle='#b89040';
  ctx.beginPath(); ctx.ellipse(0,-114*s,85*s,20*s,0,0,Math.PI*2); ctx.fill();
  // Brim top
  ctx.fillStyle='#e8c060';
  ctx.beginPath(); ctx.ellipse(0,-118*s,85*s,18*s,0,0,Math.PI*2); ctx.fill();
  // Crown
  ctx.fillStyle='#e8c060';
  ctx.beginPath();
  ctx.moveTo(-42*s,-118*s);
  ctx.quadraticCurveTo(-38*s,-180*s, 0,-188*s);
  ctx.quadraticCurveTo(38*s,-180*s, 42*s,-118*s);
  ctx.closePath(); ctx.fill();
  // Hat highlight
  ctx.fillStyle='rgba(255,255,200,0.18)';
  ctx.beginPath(); ctx.ellipse(-10*s,-158*s,16*s,24*s,0.2,0,Math.PI*2); ctx.fill();
  // Red band
  ctx.fillStyle='#cc0000';
  ctx.beginPath(); ctx.ellipse(0,-120*s,42*s,11*s,0,0,Math.PI*2); ctx.fill();
  // Band highlight
  ctx.fillStyle='rgba(255,100,100,0.3)';
  ctx.beginPath(); ctx.ellipse(-8*s,-121*s,18*s,6*s,0,0,Math.PI*2); ctx.fill();

  // ── Z scar glow on chest ──
  ctx.shadowColor='#aaff00'; ctx.shadowBlur=18*s;
  ctx.strokeStyle='#88ff00'; ctx.lineWidth=4*s;
  ctx.beginPath(); ctx.moveTo(-24*s,-25*s); ctx.lineTo(-6*s,-25*s); ctx.lineTo(-24*s,-8*s); ctx.lineTo(-6*s,-8*s); ctx.stroke();
  ctx.shadowBlur=0;

  ctx.restore();
}

  // Stars
  for(let i=0;i<160;i++){
    const blink=0.4+0.5*Math.abs(Math.sin(t*0.001+i));

    ctx.beginPath(); ctx.arc((i*173+50)%W,(i*97+20)%(H*0.65),i%4===0?2:1,0,Math.PI*2); ctx.fill();

  ctx.shadowColor=lv.col; ctx.shadowBlur=35;
  ctx.strokeStyle=lv.col; ctx.lineWidth=3; ctx.strokeRect(18,18,W-36,H-36); ctx.shadowBlur=0;
  ctx.font='bold 26px Courier New'; ctx.fillStyle=lv.col; ctx.textAlign='center';
  ctx.fillText(`LEVEL ${game.level+1}: ${lv.name.toUpperCase()}`,W/2,100);
  ctx.font='bold 14px Courier New'; ctx.fillStyle='#777'; ctx.fillText(lv.sub,W/2,130);

  ctx.font='16px Courier New'; ctx.fillStyle='#fff';

function drawOverlay(title,titleCol,sub,sub2){

// ── GAME FLOW ─────────────────────────────────────────────────────────────────
function startGame(){
  game.level=0; game.lives=3; game.score=0; startLevel();
}
function startLevel(){
  game.state='cutscene'; game.cutTimer=0;
  game.enemies=[]; game.projectiles=[]; game.particles=[];
  game.boss=null; game.bossDefeated=false;
  game.wave=0; game.waveTimer=0; game.invTimer=90;
  P.x=W/2; P.y=H/2; P.z=0;
  P.lightCd=0; P.healCd=0; P.teleCd=0;
  P.blockActive=false; P.blockDuration=0; P.blockCd=0;
  P.gear5Active=false; P.gear5Duration=0; P.gear5Cd=0;
  P.hakiCd=0; P.speed=P.baseSpeed;
  buildEnvObjs();
}
function nextLevel(){
  game.level++;
  if(game.level>=LEVELS.length) game.state='win';
  else startLevel();
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update(){
  if(game.state==='cutscene'){
    game.cutTimer++;
    if(game.cutTimer>=game.cutDuration){ game.state='playing'; game.cutTimer=0; spawnWave(); }
    return;
  }
  if(game.state!=='playing'&&game.state!=='boss') return;

  // Player move
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])    dy=-1;
  if(keys['s']||keys['arrowdown'])  dy= 1;
  if(keys['a']||keys['arrowleft'])  dx=-1;
  if(keys['d']||keys['arrowright']) dx= 1;
  P.moving=(dx!==0||dy!==0);
  if(dx&&dy){ dx*=0.707; dy*=0.707; }
  P.x=Math.max(P.size,Math.min(W-P.size,P.x+dx*P.speed));
  P.y=Math.max(P.size,Math.min(H-P.size,P.y+dy*P.speed));

  // Bob while moving
  P.bobT+=P.moving?0.2:0.05;
  P.z = P.moving ? Math.abs(Math.sin(P.bobT))*8 : Math.max(0,P.z-0.5);

  if(P.lightCd>0) P.lightCd--;
  if(P.healCd>0)  P.healCd--;
  if(P.teleCd>0)  P.teleCd--;
  if(P.blockCd>0)  P.blockCd--;
  if(P.hakiCd>0)  P.hakiCd--;

  // Block active — invincible + slow movement
  if(P.blockActive){
    P.blockDuration--;
    game.invTimer=Math.max(game.invTimer,2);
    P.speed=1.2;
    if(P.blockDuration%12===0) spawnParticles(P.x,P.y,'#4488ff',3,0.5);
    if(P.blockDuration<=0){
      P.blockActive=false;
      P.speed=P.baseSpeed;
      spawnParticles(P.x,P.y,'#88bbff',8,0.6);
    }
  }

  if(P.gear5Cd>0)  P.gear5Cd--;

  // Gear 5 active logic
  if(P.gear5Active){
    P.gear5Duration--;
    // Floating white cloud particles
    if(P.gear5Duration%5===0) spawnParticles(P.x+(Math.random()-0.5)*30,P.y+(Math.random()-0.5)*30,'#ffffff',2,0.4);
    // Rapid giant cartoon punches in all directions
    P.gear5PunchTimer++;
    if(P.gear5PunchTimer>=4){
      P.gear5PunchTimer=0;
      const a=P.facing+(Math.random()-0.5)*0.5;
      const proj=mkProj(P.x,P.y,a,'player','gear5fist');
      game.projectiles.push(proj);
      // Also spawn a random spread shot
      const a2=Math.random()*Math.PI*2;
      game.projectiles.push(mkProj(P.x,P.y,a2,'player','gear5fist'));
    }
    if(P.gear5Duration<=0){
      P.gear5Active=false;
      P.speed=P.baseSpeed;
      spawnParticles(P.x,P.y,'#ffffff',25);
    }
  }
  game.halos=game.halos.filter(h=>{
    h.r+=16; h.alpha=Math.max(0,1-h.r/h.maxR); return h.alpha>0;
  });
  if(game.invTimer>0) game.invTimer--;

  game.enemies.forEach(e=>e.update());
  if(game.boss) game.boss.update();

  game.projectiles=game.projectiles.filter(p=>{
    p.t++;
    p.x+=Math.cos(p.angle)*p.spd;
    p.y+=Math.sin(p.angle)*p.spd;
    if(p.sub==='water') p.x+=Math.cos(p.angle+Math.PI/2)*Math.sin(p.t*0.12)*2.8;
    // Arc z
    if(p.owner==='player') p.z=12+Math.sin(p.t*0.18)*4;
    if(p.x<-25||p.x>W+25||p.y<-25||p.y>H+25) p.alive=false;
    return p.alive;
  });

  game.particles=game.particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.z=Math.max(0,p.z+p.vz); p.vz-=0.3;
    if(p.z<=0){p.z=0; p.vz=0; p.vx*=0.7; p.vy*=0.7;}
    p.life--; return p.life>0;
  });

  checkCollisions();

  if(game.state==='playing'){
    game.waveTimer++;
    if(game.enemies.length===0&&game.waveTimer>80){
      if(game.wave<game.maxWaves-1){ game.wave++; game.waveTimer=0; spawnWave(); }
      else {
        const lv=LEVELS[game.level];
        if(lv.hasBoss&&!game.bossDefeated){
          game.state='boss';
          game.boss=new Boss(lv.bossKey);
        } else if(!lv.hasBoss) game.state='levelcomplete';
      }
    }
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);

  if(game.state==='menu')          { drawMenu(); return; }
  if(game.state==='cutscene')      { drawCutscene(); return; }
  if(game.state==='gameover')      { drawOverlay('GAME OVER','#ff2222',`Score: ${game.score}`,'CLICK OR ENTER TO TRY AGAIN'); return; }
  if(game.state==='levelcomplete'){
    const lv=LEVELS[game.level];
    const cont=game.level<LEVELS.length-1;
    drawOverlay('LEVEL CLEAR! ⚡',lv.col,`${lv.name}  •  Score: ${game.score}`,cont?'CLICK OR ENTER FOR NEXT LEVEL':'🏆 ALL LEVELS DEFEATED!');
    return;
  }
  if(game.state==='win'){ drawOverlay('VICTORY!','#aaff00',`Luffy conquers all four worlds!  •  Score: ${game.score}`,'CLICK OR ENTER TO PLAY AGAIN'); return; }

  // ─ Draw floor ─
  drawBackground();

  // ─ Haki halo rings (drawn on floor before everything) ─
  game.halos.forEach(h=>{
    ctx.save();
    ctx.globalAlpha=h.alpha;
    ctx.strokeStyle=h.col;
    ctx.lineWidth=h.w*h.alpha;
    ctx.shadowColor=h.col; ctx.shadowBlur=30*h.alpha;
    ctx.beginPath(); ctx.ellipse(h.x,h.y,h.r,h.r*0.45,0,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();
  });

  // ─ Collect all scene objects for depth sort ─
  const drawables = [];

  // Env objects
  game.envObjs.forEach(o=>{
    if(o.type==='building'||o.type==='stall'){
      // Buildings drawn first (they're background)
      drawEnvObj(o);
    } else {
      drawables.push({groundY:o.groundY, fn:()=>drawEnvObj(o)});
    }
  });

  // Particles (depth sorted)
  game.particles.forEach(p=>{
    drawables.push({groundY:p.y, fn:()=>{
      const ps=sY(p.y,p.z);
      ctx.globalAlpha=p.life/p.maxLife;
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,ps,p.size,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }});
  });

  // Enemies
  game.enemies.forEach(e=>drawables.push({groundY:e.y,fn:()=>e.draw()}));

  // Boss
  if(game.boss) drawables.push({groundY:game.boss.y,fn:()=>game.boss.draw()});

  // Player
  drawables.push({groundY:P.y,fn:drawLuffy});

  // Projectiles
  game.projectiles.forEach(p=>drawables.push({groundY:p.y,fn:()=>drawProjectile(p)}));

  // Sort back to front by groundY
  drawables.sort((a,b)=>a.groundY-b.groundY);
  drawables.forEach(d=>d.fn());

  drawHUD();

  // Banners
  ctx.textAlign='center';
  if(game.state==='boss'&&!game.boss){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,H/2-45,W,90);
    ctx.shadowColor='#ff4400'; ctx.shadowBlur=22;
    ctx.fillStyle='#ff4400'; ctx.font='bold 40px Courier New'; ctx.fillText('BOSS INCOMING!',W/2,H/2+13); ctx.shadowBlur=0;
  }
  if(game.state==='playing'&&game.enemies.length===0&&game.wave<game.maxWaves-1&&game.waveTimer<60){
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(W/2-165,H/2-32,330,64);
    ctx.fillStyle='#44ff44'; ctx.font='bold 28px Courier New'; ctx.fillText('WAVE CLEAR!',W/2,H/2+11);
  }
  ctx.textAlign='left';
}

const joystickZone  = document.getElementById('joystickZone');

const aimDot        = document.getElementById('aimDot');
const joyBase       = document.getElementById('joystickBase');

const touch = { joyActive:false, joyId:null, joyOriginX:0, joyOriginY:0, aimX:W/2, aimY:H/2 };
const JOY_RADIUS = 48;

function joyRect(){ return joystickZone.getBoundingClientRect(); }

joystickZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  touch.joyActive=true; touch.joyId=t.identifier;
  const r=joyRect();
  touch.joyOriginX=t.clientX-r.left;
  touch.joyOriginY=t.clientY-r.top;
  joystickThumb.style.transition='none';
},{passive:false});

joystickZone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==touch.joyId) continue;
    const r=joyRect();
    const dx=t.clientX-r.left-touch.joyOriginX;
    const dy=t.clientY-r.top-touch.joyOriginY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const clamp=Math.min(dist,JOY_RADIUS);
    const nx=dx/Math.max(dist,1), ny=dy/Math.max(dist,1);
    joystickThumb.style.left=(touch.joyOriginX+nx*clamp-26)+'px';
    joystickThumb.style.top =(touch.joyOriginY+ny*clamp-26)+'px';
    // Map to keys
    const DEAD=0.25;
    keys['w']=ny< -DEAD && clamp>10;
    keys['s']=ny>  DEAD && clamp>10;
    keys['a']=nx< -DEAD && clamp>10;
    keys['d']=nx>  DEAD && clamp>10;
  }
},{passive:false});

function joyEnd(e){
  for(const t of e.changedTouches){
    if(t.identifier===touch.joyId){
      touch.joyActive=false; touch.joyId=null;
      keys['w']=keys['s']=keys['a']=keys['d']=false;
      joystickThumb.style.transition='left 0.12s,top 0.12s';
      joystickThumb.style.left='39px'; joystickThumb.style.top='39px';
    }
  }
}
joystickZone.addEventListener('touchend',  joyEnd,{passive:false});
joystickZone.addEventListener('touchcancel',joyEnd,{passive:false});

// Aim by touching the canvas
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(game.state==='menu'||game.state==='cutscene'||game.state==='levelcomplete'||game.state==='gameover'||game.state==='win'){
    // Tap canvas to advance screens
    if(game.state==='menu')          startGame();
    else if(game.state==='cutscene') game.cutTimer=game.cutDuration;
    else if(game.state==='levelcomplete') nextLevel();
    else if(game.state==='gameover'||game.state==='win') startGame();
    return;
  }
  const r=canvas.getBoundingClientRect();
  const scale=W/r.width;
  for(const t of e.changedTouches){
    const cx=(t.clientX-r.left)*scale;
    const cy=(t.clientY-r.top)*scale;
    touch.aimX=cx; touch.aimY=cy;
    mX=cx; mY=cy;
    P.facing=Math.atan2(cy-P.y,cx-P.x);
    // Auto-fire lightning on canvas tap
    fireLightning();
    // Show aim dot
    aimDot.style.display='block';
    aimDot.style.left=t.clientX+'px';
    aimDot.style.top =t.clientY+'px';
  }
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const scale=W/r.width;
  for(const t of e.changedTouches){
    const cx=(t.clientX-r.left)*scale;
    const cy=(t.clientY-r.top)*scale;
    touch.aimX=cx; touch.aimY=cy;
    mX=cx; mY=cy;
    P.facing=Math.atan2(cy-P.y,cx-P.x);
    aimDot.style.left=t.clientX+'px';
    aimDot.style.top =t.clientY+'px';
  }
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  aimDot.style.display='none';
},{passive:false});

// Power button dispatcher
function touchPower(power){
  if(game.state!=='playing'&&game.state!=='boss') return;
  if(power==='lightning') fireLightning();
  else if(power==='heal')     fireHeal();
  else if(power==='teleport') doTeleport();
  else if(power==='block')    doBlock();
  else if(power==='gear5')    fireGear5();
  else if(power==='haki')     fireHaki();
}

// Update button glow states each frame
function updateButtonStates(){
  const btns={
    'btn-lightning': P.lightCd<=0,
    'btn-heal':      P.healCd<=0 && game.lives<3,
    'btn-teleport':  P.teleCd<=0,
    'btn-block':     P.blockCd<=0 && !P.blockActive,
    'btn-gear5':     P.gear5Cd<=0 && !P.gear5Active,
    'btn-haki':      P.hakiCd<=0,
  };
  for(const [id,ready] of Object.entries(btns)){
    const el=document.getElementById(id);
    if(!el) continue;
    el.classList.toggle('ready', ready);
    el.style.opacity=ready?'1':'0.45';
  }
  // Active glow for block/gear5
  const b=document.getElementById('btn-block');
  const g=document.getElementById('btn-gear5');
  if(b) b.classList.toggle('active-glow', P.blockActive);
  if(g) g.classList.toggle('active-glow', P.gear5Active);
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
function resize(){
  // Use screen dimensions when running as home screen app (no browser chrome)
  const vw = window.innerWidth  || screen.width;
  const vh = window.innerHeight || screen.height;
  const s  = Math.min(vw/W, vh/H);
  canvas.style.width  = W*s+'px';
  canvas.style.height = H*s+'px';
  const isTouch = 'ontouchstart' in window;
  document.getElementById('joystickZone').style.display = isTouch ? 'block' : 'none';
  document.getElementById('powers').style.display       = isTouch ? 'grid'  : 'none';
  aimDot.style.display = 'none';
}
window.addEventListener('resize',resize);
resize();
(function loop(){ update(); render(); updateButtonStates(); requestAnimationFrame(loop); })();
</script>
